services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: corporate-nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: corporate_nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: corporate-nexus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    image: python:3.12-slim
    container_name: corporate-nexus-backend
    working_dir: /app
    command: sh -c "pip install -e . && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:20
    container_name: corporate-nexus-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    volumes:
      - ./frontend:/app
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
